name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            python3-gi python3-gi-cairo gir1.2-gtk-3.0 \
            libdbus-1-dev python3-dbus \
            libgirepository1.0-dev gcc libcairo2-dev pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # PyGObject and dbus-python are installed via system apt packages (python3-gi,
          # python3-dbus) to avoid native build failures.  Install only pure-Python deps here.
          grep -vE '^\s*(PyGObject|dbus-python)' requirements.txt | pip install -r /dev/stdin
          # keyrings.alt provides a file-based backend for headless CI (no D-Bus/Secret Service)
          pip install pytest keyrings.alt
          pip install -e . --no-deps --no-build-isolation

      - name: Run tests
        run: pytest tests/ -v
